<title>月圆之夜 镜中对决 装备图鉴</title>
<style>
:root {
  --bg-deep: #080b14;
  --bg-card: #0f1322;
  --bg-panel: #141826;
  --bg-hover: #1c2238;
  --border: #252d4a;
  --border-glow: #3a4a8a;
  --text-primary: #e8eaf6;
  --text-secondary: #8a93c0;
  --text-muted: #4a5278;
  --accent: #7c6ef7;
  --accent-glow: rgba(124,110,247,0.2);
  --gold: #f5c842;
  --gold-glow: rgba(245,200,66,0.15);
  --cyan: #26c6da;
  --green: #66bb6a;
  --red: #ef5350;
  --orange: #ff9800;
  --r-sm: 6px; --r-md: 10px; --r-lg: 16px;
  --t: 0.2s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;
  background:var(--bg-deep);color:var(--text-primary);
  min-height:100vh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(124,110,247,.15) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 10% 80%, rgba(245,200,66,.06) 0%, transparent 50%);
}

/* ===== SITE SWITCHER ===== */
.site-switcher{
  position:relative;z-index:20;
  background:rgba(8,11,20,.95);
  border-bottom:1px solid var(--border);
  padding:8px 36px;
  display:flex;align-items:center;gap:8px;
}
.switcher-label{font-size:11px;color:var(--text-muted);letter-spacing:1px;margin-right:4px;}
.switcher-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;font-size:12px;font-weight:600;
  border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--text-secondary);
  cursor:pointer;transition:var(--t);text-decoration:none;
  letter-spacing:.5px;
}
.switcher-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow);}
.switcher-btn.current{
  background:var(--accent);border-color:var(--accent);
  color:#fff;cursor:default;
}
.switcher-dot{
  width:6px;height:6px;border-radius:50%;
  background:currentColor;display:inline-block;
}

/* ===== HEADER ===== */
.site-header{
  position:relative;z-index:10;
  padding:24px 36px 0;
  display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap;
}
.site-title{
  font-size:24px;font-weight:800;letter-spacing:2px;
  background:linear-gradient(135deg,#f5c842 0%,#ff9800 45%,#ef5350 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.site-sub{
  font-size:12px;color:var(--text-secondary);letter-spacing:1px;
  border-left:2px solid var(--border-glow);padding-left:10px;margin-bottom:3px;
}
.season-badge{
  margin-left:auto;
  background:linear-gradient(135deg,#f5c842,#ff9800);
  color:#1a1200;font-size:11px;font-weight:700;
  padding:4px 14px;border-radius:20px;letter-spacing:1px;
}

/* ===== MAIN WRAP ===== */
.main-wrap{
  position:relative;z-index:5;
  max-width:1400px;margin:0 auto;
  padding:28px 36px 60px;
}

/* ===== STATS ROW ===== */
.stats-row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:24px;}
.stat-card{
  flex:1;min-width:120px;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--r-md);padding:14px 18px;text-align:center;
}
.stat-num{font-size:30px;font-weight:800;color:var(--gold);}
.stat-lbl{font-size:12px;color:var(--text-muted);margin-top:2px;}

/* ===== STAR FILTER ===== */
.star-filter-wrap{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--r-md);padding:16px 20px;margin-bottom:24px;
}
.star-filter-title{
  font-size:13px;font-weight:600;color:var(--text-primary);
  margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.star-filter-title::before{
  content:'';width:3px;height:14px;
  background:linear-gradient(180deg,var(--gold),var(--orange));
  border-radius:2px;
}
.star-filter{
  display:flex;flex-wrap:wrap;gap:10px;
}
.star-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:var(--r-md);
  border:1px solid var(--border);background:var(--bg-panel);
  color:var(--text-secondary);cursor:pointer;transition:var(--t);
  font-size:13px;font-weight:500;
}
.star-btn:hover{border-color:var(--accent);color:var(--text-primary);}
.star-btn.active{
  background:var(--accent);border-color:var(--accent);
  color:#fff;box-shadow:0 0 12px var(--accent-glow);
}
.star-btn .star-icon{color:var(--gold);font-size:12px;}
.star-btn.active .star-icon{color:#fff;}
.star-count{
  background:rgba(255,255,255,.15);
  padding:2px 8px;border-radius:10px;
  font-size:11px;font-weight:600;
}

/* ===== EQUIPMENT GRID ===== */
.equip-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:16px;
}

/* ===== EQUIPMENT CARD ===== */
.ec{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:14px;
  cursor:pointer;transition:var(--t);
  position:relative;overflow:hidden;
  text-align:center;
}
.ec::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  opacity:0;transition:var(--t);
}
.ec:hover{border-color:var(--border-glow);background:var(--bg-hover);transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.4);}
.ec:hover::before{opacity:1;}

/* Star color borders */
.ec[data-star="2"]{border-top:2px solid #78909c;}
.ec[data-star="2"]::before{background:#78909c;}
.ec[data-star="3"]{border-top:2px solid #42a5f5;}
.ec[data-star="3"]::before{background:#42a5f5;}
.ec[data-star="4"]{border-top:2px solid #66bb6a;}
.ec[data-star="4"]::before{background:#66bb6a;}
.ec[data-star="5"]{border-top:2px solid #ab47bc;}
.ec[data-star="5"]::before{background:#ab47bc;}
.ec[data-star="6"]{border-top:2px solid #ff9800;}
.ec[data-star="6"]::before{background:#ff9800;}

.ec-img-wrap{
  width:100%;aspect-ratio:1;
  background:var(--bg-panel);
  border-radius:var(--r-md);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:10px;overflow:hidden;
}
.ec-img{
  max-width:85%;max-height:85%;
  object-fit:contain;
  transition:var(--t);
}
.ec:hover .ec-img{transform:scale(1.05);}
.ec-name{
  font-size:13px;font-weight:600;color:var(--text-primary);
  margin-bottom:6px;line-height:1.3;
}
.ec-stars{
  display:flex;justify-content:center;gap:2px;
}
.ec-star{
  font-size:11px;color:var(--text-muted);
}
.ec-star.lit{color:var(--gold);}
.ec-star.s6{color:var(--orange);}

/* ===== EMPTY STATE ===== */
.empty{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty-icon{font-size:46px;margin-bottom:10px;}
.empty-msg{font-size:14px;}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px){
  .site-header{padding:20px 20px 0;}
  .main-wrap{padding:20px 20px 40px;}
  .site-switcher{padding:8px 20px;}
  .equip-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;}
}
</style>
</head>

// Image base path (relative to HTML file location)
const IMG_BASE_PATH = "file:///E:/Pictures/月圆之夜/镜中对决/装备卡牌/";

let currentFilter = 'all';

function renderEquipments(){
  const grid = document.getElementById('equip-grid');
  const empty = document.getElementById('empty-state');
  
  const filtered = currentFilter === 'all' 
    ? equipments 
    : equipments.filter(e => e.star === parseInt(currentFilter));
  
  if(filtered.length === 0){
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  
  empty.style.display = 'none';
  
  grid.innerHTML = filtered.map(eq => {
    const stars = Array(6).fill(0).map((_,i) => 
      `<span class="ec-star ${i < eq.star ? 'lit' : ''} ${eq.star === 6 ? 's6' : ''}">★</span>`
    ).join('');
    
    return `
      <div class="ec" data-star="${eq.star}" data-name="${eq.name}">
        <div class="ec-img-wrap">
          <img class="ec-img" src="${IMG_BASE_PATH}${eq.img}" alt="${eq.name}" loading="lazy" onerror="this.style.display='none'">
        </div>
        <div class="ec-name">${eq.name}</div>
        <div class="ec-stars">${stars}</div>
      </div>
    `;
  }).join('');
}

// Filter buttons
document.querySelectorAll('.star-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderEquipments();
  });
});

// Initial render
renderEquipments();
</script>
