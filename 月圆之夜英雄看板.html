<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月圆之夜 镜中对决 英雄图鉴</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    color: #eee;
}

/* ===== 顶部导航栏（与随从图鉴一致） ===== */
.top-nav {
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.nav-title {
    font-size: 20px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 10px;
}

.nav-title .icon {
    font-size: 24px;
}

.nav-links {
    display: flex;
    gap: 10px;
}

.nav-link {
    padding: 8px 16px;
    border-radius: 20px;
    text-decoration: none;
    color: #aaa;
    font-size: 14px;
    transition: all 0.3s;
    border: 1px solid transparent;
}

.nav-link:hover {
    background: rgba(255,255,255,0.1);
    color: #fff;
}

.nav-link.active {
    background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    border-color: rgba(255,255,255,0.2);
}

/* ===== 主容器 ===== */
.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 30px;
}

/* ===== 页面标题 ===== */
.page-header {
    text-align: center;
    margin-bottom: 30px;
}

.page-title {
    font-size: 32px;
    font-weight: bold;
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
}

.page-subtitle {
    color: #888;
    font-size: 14px;
}

/* ===== 统计卡片 ===== */
.stats-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 25px;
    flex-wrap: wrap;
}

.stat-item {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 15px 30px;
    text-align: center;
    min-width: 120px;
}

.stat-value {
    font-size: 28px;
    font-weight: bold;
    color: #ffd700;
}

.stat-label {
    font-size: 12px;
    color: #888;
    margin-top: 5px;
}

/* ===== 筛选栏 ===== */
.filter-section {
    background: rgba(0,0,0,0.3);
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 25px;
}

.filter-row {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 15px;
    flex-wrap: wrap;
}

.filter-row:last-child {
    margin-bottom: 0;
}

.filter-label {
    font-size: 14px;
    color: #aaa;
    min-width: 60px;
}

.filter-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.filter-btn {
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: #ccc;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s;
    font-size: 13px;
}

.filter-btn:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.4);
}

.filter-btn.active {
    background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
    border-color: transparent;
    color: #fff;
}

/* 强度筛选按钮颜色 */
.filter-btn.tier-t0.active { background: linear-gradient(145deg, #ffd700, #ffaa00); color: #000; }
.filter-btn.tier-t1.active { background: linear-gradient(145deg, #9b59b6, #8e44ad); }
.filter-btn.tier-t2.active { background: linear-gradient(145deg, #3498db, #2980b9); }
.filter-btn.tier-t3.active { background: linear-gradient(145deg, #7f8c8d, #616a6b); }

/* 类型筛选按钮颜色 */
.filter-btn.type-active.active { background: linear-gradient(145deg, #e74c3c, #c0392b); }
.filter-btn.type-passive.active { background: linear-gradient(145deg, #27ae60, #1e8449); }

.search-box {
    margin-left: auto;
}

.search-input {
    padding: 10px 20px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.3);
    color: #fff;
    border-radius: 25px;
    width: 250px;
    font-size: 14px;
    outline: none;
    transition: all 0.3s;
}

.search-input:focus {
    border-color: #667eea;
    box-shadow: 0 0 15px rgba(102,126,234,0.3);
}

.search-input::placeholder {
    color: #666;
}

/* ===== 英雄网格 ===== */
.hero-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
}

.hero-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 15px;
    padding: 20px;
    transition: all 0.3s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

.hero-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--tier-color, #667eea);
    opacity: 0;
    transition: opacity 0.3s;
}

.hero-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    border-color: rgba(255,255,255,0.2);
}

.hero-card:hover::before {
    opacity: 1;
}

.hero-card.tier-t0 { --tier-color: #ffd700; border-color: rgba(255,215,0,0.3); }
.hero-card.tier-t1 { --tier-color: #9b59b6; border-color: rgba(155,89,182,0.3); }
.hero-card.tier-t2 { --tier-color: #3498db; border-color: rgba(52,152,219,0.3); }
.hero-card.tier-t3 { --tier-color: #7f8c8d; border-color: rgba(127,140,141,0.3); }

.card-header {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
}

.hero-image {
    width: 70px;
    height: 70px;
    border-radius: 12px;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
}

.hero-image.no-image {
    background: linear-gradient(145deg, #2c3e50, #34495e);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
}

.hero-info {
    flex: 1;
    min-width: 0;
}

.hero-name-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
}

.hero-name {
    font-size: 18px;
    font-weight: bold;
    color: #fff;
}

.tier-badge {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: bold;
}

.tier-badge.t0 { background: linear-gradient(145deg, #ffd700, #ffaa00); color: #000; }
.tier-badge.t1 { background: linear-gradient(145deg, #9b59b6, #8e44ad); color: #fff; }
.tier-badge.t2 { background: linear-gradient(145deg, #3498db, #2980b9); color: #fff; }
.tier-badge.t3 { background: linear-gradient(145deg, #7f8c8d, #616a6b); color: #fff; }

.s11-tag {
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 10px;
    background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
    color: #fff;
    font-weight: bold;
}

.skill-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.skill-icon {
    font-size: 16px;
}

.skill-name {
    font-size: 14px;
    color: #ffd700;
}

.skill-cost {
    padding: 3px 10px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: bold;
}

.skill-cost.active {
    background: rgba(231,76,60,0.3);
    color: #e74c3c;
    border: 1px solid rgba(231,76,60,0.5);
}

.skill-cost.passive {
    background: rgba(39,174,96,0.3);
    color: #27ae60;
    border: 1px solid rgba(39,174,96,0.5);
}

.skill-cost.free {
    background: rgba(52,152,219,0.3);
    color: #3498db;
    border: 1px solid rgba(52,152,219,0.5);
}

.skill-desc {
    font-size: 13px;
    color: #aaa;
    line-height: 1.6;
    margin-bottom: 12px;
}

.card-footer {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.start-bonus {
    padding: 4px 12px;
    border-radius: 15px;
    font-size: 12px;
    background: rgba(255,215,0,0.15);
    color: #ffd700;
    border: 1px solid rgba(255,215,0,0.3);
}

.tag {
    padding: 3px 10px;
    border-radius: 10px;
    font-size: 11px;
    background: rgba(255,255,255,0.1);
    color: #888;
}

.no-result {
    text-align: center;
    padding: 60px 20px;
    color: #666;
    font-size: 16px;
    grid-column: 1 / -1;
}

/* ===== 弹窗 ===== */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(5px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
}

.modal-overlay.open {
    display: flex;
}

.modal-content {
    background: linear-gradient(145deg, #1e3a5f 0%, #2d4a6f 100%);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 30px;
    max-width: 500px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
    animation: modalIn 0.3s ease;
}

@keyframes modalIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}

.modal-close {
    position: absolute;
    top: 15px;
    right: 15px;
    width: 35px;
    height: 35px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.3s;
}

.modal-close:hover {
    background: rgba(231,76,60,0.5);
}

.modal-header {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.modal-image {
    width: 100px;
    height: 100px;
    border-radius: 15px;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,0.3);
}

.modal-image.no-image {
    background: linear-gradient(145deg, #2c3e50, #34495e);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 50px;
}

.modal-title-section {
    flex: 1;
}

.modal-hero-name {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.modal-skill-name {
    font-size: 16px;
    color: #ffd700;
    margin-bottom: 10px;
}

.modal-section {
    margin-bottom: 15px;
}

.modal-label {
    font-size: 12px;
    color: #888;
    margin-bottom: 5px;
}

.modal-value {
    font-size: 14px;
    color: #fff;
    line-height: 1.6;
}

.modal-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.modal-tag {
    padding: 5px 12px;
    border-radius: 15px;
    font-size: 12px;
    background: rgba(255,255,255,0.1);
    color: #ccc;
}

.modal-note {
    background: rgba(255,215,0,0.1);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 10px;
    padding: 15px;
    margin-top: 15px;
    font-size: 13px;
    color: #ffd700;
    line-height: 1.6;
}

/* ===== 响应式 ===== */
@media (max-width: 768px) {
    .top-nav {
        flex-direction: column;
        gap: 15px;
        padding: 15px;
    }
    
    .nav-links {
        flex-wrap: wrap;
        justify-content: center;
    }
    
    .container {
        padding: 15px;
    }
    
    .hero-grid {
        grid-template-columns: 1fr;
    }
    
    .search-box {
        width: 100%;
        margin-left: 0;
    }
    
    .search-input {
        width: 100%;
    }
    
    .filter-row {
        flex-direction: column;
        align-items: flex-start;
    }
}
</style>
</head>

// 状态
let currentTier = 'all';
let currentType = 'all';
let currentSearch = '';

// 初始化统计
function initStats() {
    const activeCount = HEROES.filter(h => h.skillType === '主动').length;
    const passiveCount = HEROES.filter(h => h.skillType === '被动').length;
    document.getElementById('activeCount').textContent = activeCount;
    document.getElementById('passiveCount').textContent = passiveCount;
}

// 获取英雄图片
function getHeroImage(hero) {
    const imgPath = IMAGE_MAP[hero.name];
    if (imgPath) {
        return `<img src="${imgPath}" alt="${hero.name}" class="hero-image" onerror="this.outerHTML='<div class=\\'hero-image no-image\\'>${hero.emoji}</div>'">`;
    }
    return `<div class="hero-image no-image">${hero.emoji}</div>`;
}

// 获取技能消耗显示
function getSkillCost(cost) {
    if (cost === '被动') {
        return '<span class="skill-cost passive">🌀 被动</span>';
    }
    if (cost === 0) {
        return '<span class="skill-cost free">⚡ 免费</span>';
    }
    return `<span class="skill-cost active">⚡ ${cost}金币</span>`;
}

// 创建英雄卡片
function createHeroCard(hero) {
    const newTag = hero.isNew ? '<span class="s11-tag">S11</span>' : '';
    const startBonus = hero.startBonus !== '无' && hero.startBonus !== '待确认' 
        ? `<span class="start-bonus">开局+${hero.startBonus}</span>` 
        : '';
    const tags = hero.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
    
    return `
        <div class="hero-card tier-${hero.tier.toLowerCase()}" onclick="openModal(${hero.id})">
            <div class="card-header">
                ${getHeroImage(hero)}
                <div class="hero-info">
                    <div class="hero-name-row">
                        <span class="hero-name">${hero.name}</span>
                        ${newTag}
                        <span class="tier-badge ${hero.tier.toLowerCase()}">${hero.tier}</span>
                    </div>
                    <div class="skill-row">
                        <span class="skill-icon">${hero.emoji}</span>
                        <span class="skill-name">${hero.skillName}</span>
                        ${getSkillCost(hero.skillCost)}
                    </div>
                </div>
            </div>
            <div class="skill-desc">${hero.skillDesc}</div>
            <div class="card-footer">
                ${startBonus}
                ${tags}
            </div>
        </div>
    `;
}

// 渲染英雄网格
function renderHeroes() {
    const searchLower = currentSearch.toLowerCase();
    const filtered = HEROES.filter(hero => {
        if (currentTier !== 'all' && hero.tier !== currentTier) return false;
        if (currentType !== 'all' && hero.skillType !== currentType) return false;
        if (searchLower) {
            const match = hero.name.toLowerCase().includes(searchLower) ||
                         hero.skillName.toLowerCase().includes(searchLower) ||
                         hero.skillDesc.toLowerCase().includes(searchLower) ||
                         hero.tags.some(t => t.toLowerCase().includes(searchLower));
            if (!match) return false;
        }
        return true;
    });
    
    const html = filtered.length > 0 
        ? filtered.map(createHeroCard).join('')
        : '<div class="no-result">🔍 没有找到匹配的英雄</div>';
    
    document.getElementById('heroGrid').innerHTML = html;
}

// 打开弹窗
function openModal(heroId) {
    const hero = HEROES.find(h => h.id === heroId);
    if (!hero) return;
    
    const newTag = hero.isNew ? '<span class="s11-tag">S11</span>' : '';
    const tags = hero.tags.map(tag => `<span class="modal-tag">${tag}</span>`).join('');
    const noteHtml = hero.note ? `<div class="modal-note">💡 ${hero.note}</div>` : '';
    
    document.getElementById('modalBody').innerHTML = `
        <div class="modal-header">
            ${getHeroImage(hero)}
            <div class="modal-title-section">
                <div class="modal-hero-name">${hero.name} ${newTag}</div>
                <div class="modal-skill-name">${hero.emoji} ${hero.skillName} ${getSkillCost(hero.skillCost)}</div>
            </div>
        </div>
        <div class="modal-section">
            <div class="modal-label">技能描述</div>
            <div class="modal-value">${hero.skillDesc}</div>
        </div>
        <div class="modal-section">
            <div class="modal-label">开局奖励</div>
            <div class="modal-value">${hero.startBonus}</div>
        </div>
        <div class="modal-section">
            <div class="modal-label">强度评级</div>
            <div class="modal-value"><span class="tier-badge ${hero.tier.toLowerCase()}">${hero.tier}</span></div>
        </div>
        <div class="modal-section">
            <div class="modal-label">标签</div>
            <div class="modal-tags">${tags}</div>
        </div>
        ${noteHtml}
    `;
    
    document.getElementById('modalOverlay').classList.add('open');
}

// 关闭弹窗
function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
}

// 筛选按钮事件
document.getElementById('tierFilters').addEventListener('click', e => {
    if (e.target.classList.contains('filter-btn')) {
        document.querySelectorAll('#tierFilters .filter-btn').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        currentTier = e.target.dataset.tier;
        renderHeroes();
    }
});

document.getElementById('typeFilters').addEventListener('click', e => {
    if (e.target.classList.contains('filter-btn')) {
        document.querySelectorAll('#typeFilters .filter-btn').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        currentType = e.target.dataset.type;
        renderHeroes();
    }
});

// 搜索事件
document.getElementById('searchInput').addEventListener('input', e => {
    currentSearch = e.target.value;
    renderHeroes();
});

// 弹窗点击外部关闭
document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
});

// 初始化
initStats();
renderHeroes();
</script>

</body>
</html>
