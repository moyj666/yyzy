        let currentStar = 'all';
        let currentRace = 'all';

        function getRaceClass(race) {
            const map = { '中立': 'zhongli', '龙': 'long', '机械': 'jixie', '自然': 'ziran', '战士': 'zhanshi', '野兽': 'yeshou', '幽灵': 'youl', '星裔': 'xingyi' };
            return map[race] || 'zhongli';
        }

        function renderCards() {
            const grid = document.getElementById('cardsGrid');
            const filtered = cards.filter(card => {
                const starMatch = currentStar === 'all' || card.star === parseInt(currentStar);
                const raceMatch = currentRace === 'all' || card.race === currentRace;
                return starMatch && raceMatch;
            });

            document.getElementById('cardCount').textContent = filtered.length;

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-results">😕 没有找到符合条件的卡牌</div>';
                return;
            }

            grid.innerHTML = filtered.map(card => `
                <div class="card star-${card.star}">
                    <img src="${card.img}" alt="${card.name}" class="card-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22180%22><rect fill=%22%23333%22 width=%22150%22 height=%22180%22/><text fill=%22%23999%22 x=%2275%22 y=%2290%22 text-anchor=%22middle%22>暂无图片</text></svg>'">
                    <div class="card-info">
                        <div class="card-name">${card.name}</div>
                        <div class="card-meta">
                            <span class="card-race ${getRaceClass(card.race)}">${card.race}</span>
                            <span class="card-star">${'⭐'.repeat(card.star)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 星级筛选
        document.getElementById('starFilters').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('#starFilters .filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                currentStar = e.target.dataset.star;
                renderCards();
            }
        });

        // 种族筛选
        document.getElementById('raceFilters').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('#raceFilters .filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                currentRace = e.target.dataset.race;
                renderCards();
            }
        });

        // 初始化
        renderCards();
    </script>
